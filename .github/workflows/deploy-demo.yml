name: Deploy DEMO (any commit)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Коммит / тег / ветка для деплоя в DEMO (напр. main, abc1234)"
        required: true
        default: "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: demo
  DEMO_API_URL: https://demo-api.qazyna.ai
  DEMO_FORM_CONFIGS_URL: https://demo.qazyna.ai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.resolve.outputs.image_tag }}
      full_image: ${{ steps.resolve.outputs.full_image }}
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve commit SHA
        id: resolve
        run: |
          SHA=$(git rev-parse HEAD)
          REPO_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=demo-sha-${SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${REGISTRY}/${REPO_LOWER}:demo-sha-${SHA}" >> $GITHUB_OUTPUT
          echo "Deploying commit: ${SHA}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image (with DEMO build args)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.resolve.outputs.full_image }}
          build-args: |
            VITE_API_BASE_URL=${{ env.DEMO_API_URL }}
            VITE_FORM_CONFIGS_URL=${{ env.DEMO_FORM_CONFIGS_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            DOCUMENT_TYPES_API_BASE_URL=${{ env.DEMO_API_URL }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Ensure namespace
        run: kubectl apply -f k8s/demo/namespace.yaml

      - name: Create/update fin-web secret (ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::secret ANTHROPIC_API_KEY is empty"
            exit 1
          fi
          kubectl -n demo create secret generic fin-web-secret \
            --from-literal=ANTHROPIC_API_KEY="$ANTHROPIC_API_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Verify basic-auth secret exists
        run: |
          if ! kubectl -n demo get secret basic-auth >/dev/null 2>&1; then
            echo "::error::secret 'basic-auth' missing in namespace 'demo'."
            echo "Создай вручную на сервере:"
            echo "  htpasswd -cb auth <user> <password>"
            echo "  kubectl -n demo create secret generic basic-auth --from-file=auth"
            exit 1
          fi

      - name: Apply service and ingress
        run: |
          kubectl apply -f k8s/demo/service.yaml
          kubectl apply -f k8s/demo/ingress.yaml

      - name: Deploy fin-web to DEMO
        env:
          IMAGE_NAME: ${{ needs.build.outputs.full_image }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          envsubst < k8s/demo/deployment.yaml | kubectl apply -f -
          kubectl -n demo rollout restart deployment/fin-web
          kubectl -n demo rollout status deployment/fin-web --timeout=600s
          kubectl -n demo get deploy fin-web \
            -o jsonpath='{.metadata.annotations.fin-web\.io/deployed-commit}'
          echo ""

      - name: Summary
        run: |
          echo "## DEMO frontend deployed" >> $GITHUB_STEP_SUMMARY
          echo "- ref: \`${{ inputs.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- image: \`${{ needs.build.outputs.full_image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://demo.qazyna.ai" >> $GITHUB_STEP_SUMMARY
          echo "- API: \`${{ env.DEMO_API_URL }}\`" >> $GITHUB_STEP_SUMMARY
