name: Build and Deploy to K8s

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Hardcoded build-args для dev-окружения (симметрично с deploy-demo.yml).
  # Раньше эти URL читались из `vars.*` репозитория, что приводило к молчаливо
  # пустой подстановке если variable не задан — фронт тогда уходит на свой
  # origin (dev.qazyna.ai/api/...) и получает 404.
  DEV_API_URL: https://dev-api.qazyna.ai
  DEV_FORM_CONFIGS_URL: https://dev.qazyna.ai/api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ env.DEV_API_URL }}
            VITE_FORM_CONFIGS_URL=${{ env.DEV_FORM_CONFIGS_URL }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            DOCUMENT_TYPES_API_BASE_URL=${{ env.DEV_API_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
          echo "KUBECONFIG=$HOME/.kube/config" >> $GITHUB_ENV

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Deploy to K8s
        run: |
          # Превращаем имя репозитория в нижний регистр для Docker image
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG="${{ env.REGISTRY }}/${REPO_LOWER}:latest"

          # Заменяем плейсхолдер в deployment.yaml на реальный образ
          sed -i "s|DOCKER_IMAGE_PLACEHOLDER|$IMAGE_TAG|g" k8s/deployment.yaml

          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

          # Принудительное обновление deployment
          kubectl rollout restart deployment/fin-web

          # Ожидание обновления
          kubectl rollout status deployment/fin-web
