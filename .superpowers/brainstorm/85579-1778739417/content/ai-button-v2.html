<h2>Кнопка AI — финальный вид</h2>

<div class="section">
  <h3>Тулбар документов</h3>
  <div class="mockup">
    <div class="mockup-header">Document Form Toolbar</div>
    <div class="mockup-body" style="padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:8px;">
          <button style="padding:10px 16px;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:13px;">Провести и закрыть</button>
          <button style="padding:10px 16px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;">Сохранить</button>
          <button style="padding:10px 16px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;">Провести</button>
          <button style="padding:10px;background:#f0f0f0;border:none;border-radius:8px;">🖨</button>
          <button style="padding:10px;background:#f0f0f0;border:none;border-radius:8px;">⇄</button>
          <button style="padding:10px;background:#f0f0f0;border:none;border-radius:8px;">▤</button>
          <button style="padding:10px;background:#f0f0f0;border:none;border-radius:8px;">🔗</button>
          <button style="padding:10px 16px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;">Отчёты</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button style="padding:8px 20px;background:linear-gradient(135deg, #6366f1, #8b5cf6);border:none;border-radius:8px;font-size:13px;color:white;font-weight:600;cursor:pointer;">AI</button>
          <button style="padding:10px 16px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;">Ещё</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section" style="margin-top:24px;">
  <h3>Тулбар справочников</h3>
  <div class="mockup">
    <div class="mockup-header">Dictionary Form Toolbar</div>
    <div class="mockup-body" style="padding:16px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:8px;">
          <button style="padding:10px 16px;background:#3b82f6;color:white;border:none;border-radius:8px;font-size:13px;">Сохранить и закрыть</button>
          <button style="padding:10px 16px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;">Сохранить</button>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button style="padding:8px 20px;background:linear-gradient(135deg, #6366f1, #8b5cf6);border:none;border-radius:8px;font-size:13px;color:white;font-weight:600;cursor:pointer;">AI</button>
          <button style="padding:10px 16px;background:#f0f0f0;border:none;border-radius:8px;font-size:13px;">Ещё</button>

      </div>

</div>

<div class="section" style="margin-top:24px;">
  <h3>Состояния кнопки</h3>
  <div style="display:flex;gap:32px;flex-wrap:wrap;align-items:flex-end;">
    <div style="text-align:center;">
      <p class="label">По умолчанию</p>
      <button style="padding:8px 20px;background:linear-gradient(135deg, #6366f1, #8b5cf6);border:none;border-radius:8px;font-size:13px;color:white;font-weight:600;cursor:pointer;min-width:56px;">AI</button>
    </div>
    <div style="text-align:center;">
      <p class="label">Загрузка (генерация)</p>
      <button style="padding:8px 20px;background:linear-gradient(135deg, #6366f1, #8b5cf6);border:none;border-radius:8px;font-size:13px;color:white;font-weight:600;cursor:not-allowed;opacity:0.85;min-width:56px;display:flex;align-items:center;justify-content:center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" style="animation:spin 1s linear infinite;">
          <path d="M21 12a9 9 0 11-6.219-8.56"/>
        </svg>
      </button>
      <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>
    </div>
  </div>
</div>
