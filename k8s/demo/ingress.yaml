apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fin-web
  namespace: demo
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Basic-auth, как и на dev. Секрет basic-auth создаётся workflow'ом
    # из GitHub Secret DEMO_BASIC_AUTH (формат htpasswd: user:$apr1$...).
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Restricted - demo environment"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - demo.qazyna.ai
      secretName: fin-web-demo-tls
  rules:
    - host: demo.qazyna.ai
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fin-web-service
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fin-web-service
                port:
                  number: 4173
