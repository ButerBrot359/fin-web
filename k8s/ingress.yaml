apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fin-web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Временная защита до настоящей авторизации. Удалить эти 3 строки чтобы снять.
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: basic-auth
    nginx.ingress.kubernetes.io/auth-realm: "Restricted — dev environment"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dev.qazyna.ai
      secretName: fin-web-tls
  rules:
    - host: dev.qazyna.ai
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: fin-web-service
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fin-web-service
                port:
                  number: 4173
